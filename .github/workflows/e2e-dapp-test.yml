name: E2E dApp Integration Test

# Runs simple_dapp.py (from the `dapps` PyPI package) against the built
# simple_agent example for every supported link-layer / transport-layer
# combination, then posts per-combination latency and throughput metrics as
# a PR comment.
#
# Trigger: pull requests targeting main, or manually via workflow_dispatch.

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      timeout_minutes:
        description: "Per-combination run timeout (minutes)"
        required: false
        default: "5"

# Allow a single run per PR; cancel stale runs when new commits are pushed.
concurrency:
  group: e2e-dapp-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-dapp:
    name: "E2E – ${{ matrix.link }} / ${{ matrix.transport }}"
    runs-on: ubuntu-latest
    # Hard cap: build + all combinations must finish within 30 minutes.
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        link:      [zmq, posix]
        transport: [tcp, ipc]
        exclude:
          # posix/tcp requires SCTP-capable kernel modules not present on
          # ubuntu-latest runners; exclude until the runner image supports it.
          - link: posix
            transport: tcp

    steps:
      # -----------------------------------------------------------------------
      # 1. Source checkout
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Build dependencies + libe3 (Release, with examples)
      # -----------------------------------------------------------------------
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          chmod +x ./build_libe3
          ./build_libe3 -I

      - name: Build libe3 and simple_agent (Release)
        run: |
          chmod +x ./build_libe3
          ./build_libe3 -c -d build -j "$(nproc)" -r --enable-examples

      # -----------------------------------------------------------------------
      # 3. Python dapps package
      # -----------------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dapps package
        run: pip install dapps

      # -----------------------------------------------------------------------
      # 4. Locate the simple_dapp script installed by the dapps package
      # -----------------------------------------------------------------------
      - name: Locate simple_dapp.py
        id: locate_dapp
        run: |
          DAPP_SCRIPT=$(python - <<'EOF'
          import importlib.util, pathlib, sys
          # The dapps package exposes simple_dapp.py either as a console
          # script entry-point or as a module file; try both conventions.
          try:
              import dapps
              pkg_dir = pathlib.Path(dapps.__file__).parent
              candidates = list(pkg_dir.glob("**/simple_dapp.py"))
              if candidates:
                  print(candidates[0])
                  sys.exit(0)
          except ImportError:
              pass
          # Fall back to the entry-point installed into the PATH
          import shutil
          ep = shutil.which("simple_dapp") or shutil.which("simple_dapp.py")
          if ep:
              print(ep)
              sys.exit(0)
          print("NOT_FOUND")
          EOF
          )
          echo "dapp_script=$DAPP_SCRIPT" >> "$GITHUB_OUTPUT"
          if [ "$DAPP_SCRIPT" = "NOT_FOUND" ]; then
            echo "::error::simple_dapp.py not found in the dapps package"
            exit 1
          fi
          echo "Found simple_dapp at: $DAPP_SCRIPT"

      # -----------------------------------------------------------------------
      # 5. Run the end-to-end test with a per-combination timeout
      # -----------------------------------------------------------------------
      - name: Run E2E test (${{ matrix.link }}/${{ matrix.transport }})
        id: run_e2e
        timeout-minutes: ${{ fromJSON(github.event.inputs.timeout_minutes || '5') }}
        env:
          LINK:      ${{ matrix.link }}
          TRANSPORT: ${{ matrix.transport }}
          AGENT_BIN: build/examples/simple_agent
          DAPP_SCRIPT: ${{ steps.locate_dapp.outputs.dapp_script }}
          METRICS_FILE: metrics_${{ matrix.link }}_${{ matrix.transport }}.json
        run: |
          set -euo pipefail

          # Create IPC socket directory if required.
          if [ "$TRANSPORT" = "ipc" ]; then
            mkdir -p /tmp/dapps
          fi

          # Start the agent in the background and capture its PID.
          "$AGENT_BIN" --link "$LINK" --transport "$TRANSPORT" \
            2>&1 | tee agent_${{ matrix.link }}_${{ matrix.transport }}.log &
          AGENT_PID=$!

          # Give the agent a moment to bind its sockets.
          sleep 2

          # Run the dApp and capture structured metrics written to stdout.
          # simple_dapp.py is expected to write a JSON object to stdout on exit
          # with keys: sent, received, latency_mean_us, latency_p99_us,
          # throughput_msg_per_sec.
          python "$DAPP_SCRIPT" \
            --link "$LINK" \
            --transport "$TRANSPORT" \
            --duration 30 \
            --output-json "$METRICS_FILE" \
            2>&1 | tee dapp_${{ matrix.link }}_${{ matrix.transport }}.log

          # Gracefully stop the agent.
          kill "$AGENT_PID" 2>/dev/null || true
          wait "$AGENT_PID"  2>/dev/null || true

      # -----------------------------------------------------------------------
      # 6. Upload logs and raw metrics as artifacts (always, even on failure)
      # -----------------------------------------------------------------------
      - name: Upload logs and metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs-${{ matrix.link }}-${{ matrix.transport }}
          path: |
            agent_${{ matrix.link }}_${{ matrix.transport }}.log
            dapp_${{ matrix.link }}_${{ matrix.transport }}.log
            metrics_${{ matrix.link }}_${{ matrix.transport }}.json
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Collect all per-combination metric files and post a single PR comment.
  # ---------------------------------------------------------------------------
  report-metrics:
    name: Post E2E metrics summary
    runs-on: ubuntu-latest
    needs: e2e-dapp
    if: always() && github.event_name == 'pull_request'
    permissions:
      pull-requests: write

    steps:
      - name: Download all metric artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: e2e-logs-*
          merge-multiple: true

      - name: Build metrics table and post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs   = require('fs');
            const path = require('path');

            const marker = '<!-- e2e-dapp-metrics -->';
            const sha    = context.payload.pull_request.head.sha.substring(0, 7);

            // Collect all metric JSON files produced by the matrix jobs.
            const jsonFiles = fs.readdirSync('.')
              .filter(f => f.startsWith('metrics_') && f.endsWith('.json'));

            let tableRows = '';
            if (jsonFiles.length === 0) {
              tableRows = '| — | — | — | — | — | — | — |\n';
            } else {
              for (const f of jsonFiles.sort()) {
                try {
                  const m = JSON.parse(fs.readFileSync(f, 'utf8'));
                  const combo = f.replace('metrics_', '').replace('.json', '');
                  const [link, transport] = combo.split('_');
                  tableRows += `| \`${link}\` | \`${transport}\` `
                    + `| ${m.sent ?? '–'} `
                    + `| ${m.received ?? '–'} `
                    + `| ${m.latency_mean_us ?? '–'} µs `
                    + `| ${m.latency_p99_us  ?? '–'} µs `
                    + `| ${m.throughput_msg_per_sec ?? '–'} msg/s |\n`;
                } catch {
                  tableRows += `| (parse error) | | | | | | |\n`;
                }
              }
            }

            const body = [
              marker,
              `## 📡 E2E dApp Integration Metrics (commit \`${sha}\`)`,
              '',
              '| Link | Transport | Sent | Received | Latency mean | Latency p99 | Throughput |',
              '|------|-----------|------|----------|--------------|-------------|------------|',
              tableRows.trimEnd(),
              '',
              `> _Tested on \`ubuntu-latest\`, Release build, 30 s per combination_`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
