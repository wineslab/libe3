name: E2E dApp Integration

# Runs example_simple_agent + example_simple_dapp as separate processes for
# every supported (link, transport) combination, asserts both exit cleanly,
# and posts a per-combination summary as a PR comment.
#
# POSIX/SCTP is excluded because ubuntu-latest runners lack the sctp kernel
# module. The code path is still built; only the CI matrix excludes it.

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: e2e-dapp-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: "E2E ${{ matrix.link }}/${{ matrix.transport }}"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        # POSIX/SCTP is intentionally excluded — ubuntu-latest runners lack
        # the sctp kernel module. The code path is built; we just don't
        # exercise it in CI.
        link: [zmq, posix]
        transport: [ipc, tcp]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          chmod +x ./build_libe3
          ./build_libe3 -I

      - name: Build Release with examples
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j $(nproc)

      - name: Prepare IPC directory
        run: |
          sudo mkdir -p /tmp/dapps
          sudo chmod 777 /tmp/dapps

      - name: Run agent + dApp pair (${{ matrix.link }}/${{ matrix.transport }})
        id: e2e
        run: |
          set -e
          LOG_AGENT=/tmp/agent_${{ matrix.link }}_${{ matrix.transport }}.log
          LOG_DAPP=/tmp/dapp_${{ matrix.link }}_${{ matrix.transport }}.log

          ./build/example_simple_agent \
            --link ${{ matrix.link }} \
            --transport ${{ matrix.transport }} \
            --encoding asn1 > "$LOG_AGENT" 2>&1 &
          AGENT_PID=$!
          sleep 1

          set +e
          timeout 25s ./build/example_simple_dapp \
            --link ${{ matrix.link }} \
            --transport ${{ matrix.transport }} \
            --encoding asn1 --control --timed 15 > "$LOG_DAPP" 2>&1
          DAPP_EXIT=$?
          set -e

          # Stop the agent
          kill -INT $AGENT_PID 2>/dev/null || true
          wait $AGENT_PID 2>/dev/null || true

          echo "---- AGENT LOG (tail) ----"
          tail -40 "$LOG_AGENT" || true
          echo "---- DAPP LOG (tail) ----"
          tail -40 "$LOG_DAPP" || true

          # Success criteria:
          # - dApp exits 0
          # - dApp log contains at least one decoded indication
          if [ "$DAPP_EXIT" -ne 0 ]; then
            echo "DApp exit code: $DAPP_EXIT (expected 0)"
            exit 1
          fi
          if ! grep -q "Decoded indication\|Indication #" "$LOG_DAPP"; then
            echo "No indications received by dApp"
            exit 1
          fi

          # Capture summary for PR comment
          IND_COUNT=$(grep -c "Indication #" "$LOG_DAPP" || true)
          {
            echo "### ${{ matrix.link }}/${{ matrix.transport }}"
            echo ""
            echo "- dApp exit: \`$DAPP_EXIT\`"
            echo "- Indications received: \`$IND_COUNT\`"
            echo ""
          } > /tmp/summary_${{ matrix.link }}_${{ matrix.transport }}.md

      - name: Upload combination summary
        uses: actions/upload-artifact@v4
        with:
          name: e2e-summary-${{ matrix.link }}-${{ matrix.transport }}
          path: /tmp/summary_${{ matrix.link }}_${{ matrix.transport }}.md
          if-no-files-found: warn

  comment:
    name: Post PR comment
    needs: e2e
    if: ${{ always() && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/e2e-summaries
          pattern: e2e-summary-*

      - name: Aggregate and post
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const root = '/tmp/e2e-summaries';
            let combined = '';
            try {
              for (const dir of fs.readdirSync(root)) {
                for (const f of fs.readdirSync(path.join(root, dir))) {
                  combined += fs.readFileSync(path.join(root, dir, f), 'utf8') + '\n';
                }
              }
            } catch (e) {
              combined = '_(no summaries collected — check job logs)_';
            }
            const marker = '<!-- e2e-dapp-results -->';
            const sha = context.payload.pull_request.head.sha.substring(0, 7);
            const body = [
              marker,
              `## 🔄 E2E dApp Integration Results (commit \`${sha}\`)`,
              '',
              combined,
              `> _example_simple_agent + example_simple_dapp on ubuntu-latest, Release build_`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
