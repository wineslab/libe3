name: Commit policy

# Enforce the contribution policy documented in CONTRIBUTING.md:
#   - AI agents must not add Co-authored-by/Signed-off-by; AI assistance is disclosed
#     via an `Assisted-by:` trailer whose value is free-form (any non-empty descriptor);
#   - the PR branch is a linear, fast-forward-able descendant of `main` (no merge commits);
#   - every commit in the PR builds and passes tests on its own (atomic commits).
# On approval, it also posts the exact fast-forward merge command for the maintainer.

on:
  pull_request:
  pull_request_review:
    types: [submitted]
  push:
    branches:
      - main

jobs:
  check-trailers:
    name: AI-assistant trailer policy
    if: github.event_name != 'pull_request_review'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check commit trailers
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi
          python3 scripts/check_commit_trailers.py --base "$base" --head "$head"

  linear-history:
    name: Fast-forward / linear history
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check linear, fast-forward-able history
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          merges="$(git rev-list --merges "$base..$head")"
          if [ -n "$merges" ]; then
            echo "::error::PR contains merge commits; rebase onto main (fast-forward only, no merge commits)."
            git log --merges --oneline "$base..$head"
            exit 1
          fi
          if ! git merge-base --is-ancestor "$base" "$head"; then
            echo "::error::Branch is behind main; rebase onto the latest main so it can be fast-forwarded."
            exit 1
          fi
          echo "Linear history OK: $(git rev-list --count "$base..$head") commit(s), fast-forward-able."

  per-commit-build:
    name: Each commit builds and tests
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          chmod +x ./build_libe3 || true
          ./build_libe3 -I || true

      - name: Build and test every commit (Release)
        shell: bash
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          set -e
          for sha in $(git rev-list --reverse "$base..$head"); do
            echo "::group::Building commit $sha"
            git -c advice.detachedHead=false checkout --quiet --detach "$sha"
            chmod +x ./build_libe3 || true
            ./build_libe3 -c -d build -j "$(nproc)" -r -t
            echo "::endgroup::"
          done

  merge-command:
    name: Post fast-forward merge command
    if: github.event_name == 'pull_request_review' && github.event.review.state == 'approved'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment the fast-forward merge command
        uses: actions/github-script@v7
        with:
          script: |
            const head = context.payload.pull_request.head.sha;
            const branch = context.payload.pull_request.head.ref;
            const body = [
              '### Ready to merge (fast-forward only)',
              '',
              'This PR is approved. A maintainer can land the reviewed commits with:',
              '',
              '```bash',
              'git fetch origin',
              `git checkout main && git merge --ff-only ${head} && git push origin main`,
              '```',
              '',
              `Head: \`${head}\` (branch \`${branch}\`). If \`--ff-only\` fails as non-fast-forward, the branch must be rebased on the latest \`main\`.`,
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
