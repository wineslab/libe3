name: Unit Tests

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Build and Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        build_type: [Debug, Release]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          chmod +x ./build_libe3 || true
          ./build_libe3 -I || true

      - name: Build and test with build_libe3 (${ { matrix.build_type } })
        shell: bash
        run: |
          chmod +x ./build_libe3 || true
          if [ "${{ matrix.build_type }}" = "Debug" ]; then
            BUILD_FLAG="-g"
          else
            BUILD_FLAG="-r"
          fi
          ./build_libe3 -c -d build -j $(nproc) $BUILD_FLAG -t

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          chmod +x ./build_libe3 || true
          ./build_libe3 -I || true

      - name: Configure with integration tests
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DLIBE3_BUILD_INTEGRATION_TESTS=ON

      - name: Build
        run: cmake --build build -j $(nproc)

      - name: Run integration tests
        run: cd build && ctest -L integration --output-on-failure

  all-encodings:
    # Regression guard: ASN.1, JSON, and Protocol Buffers must all be buildable
    # together in a single libe3 (the encoder is selected at runtime via
    # E3Config.encoding). Builds one library with every encoder compiled in and
    # runs the full test suite against it.
    name: All Encodings (ASN.1 + JSON + Protobuf)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          chmod +x ./build_libe3 || true
          ./build_libe3 -I || true

      - name: Configure with all encoders enabled
        run: |
          cmake -S . -B build-all \
            -DCMAKE_BUILD_TYPE=Release \
            -DLIBE3_ENABLE_ASN1=ON \
            -DLIBE3_ENABLE_JSON=ON \
            -DLIBE3_ENABLE_PROTOBUF=ON

      - name: Build
        run: cmake --build build-all -j $(nproc)

      - name: Run tests
        run: cd build-all && ctest --output-on-failure

  swig:
    name: SWIG Python Bindings
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install build + SWIG dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y swig python3-dev
          chmod +x ./build_libe3 || true
          ./build_libe3 -I || true

      - name: Configure with SWIG enabled
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$PWD/stage" \
            -DLIBE3_ENABLE_SWIG=ON \
            -DLIBE3_PYTHON_INSTALL_DIR="$PWD/stage/py"

      - name: Build SWIG bindings
        run: cmake --build build --target libe3py -j $(nproc)

      - name: Run SWIG smoke test
        run: PYTHONPATH=build/swig python3 tests/test_swig_smoke.py

      - name: Install and verify (module import + sm defs + smdir)
        run: |
          cmake --build build -j $(nproc)   # full lib needed for install
          cmake --install build
          PYTHONPATH="$PWD/stage/py" python3 -c "import libe3py; print('libe3py import OK')"
          smdir=$(PKG_CONFIG_PATH="$PWD/stage/lib/pkgconfig" pkg-config --variable=smdir libe3)
          echo "smdir=$smdir"
          test -f "$smdir/sm_simple/e3sm_simple.asn"
          test -f "$smdir/sm_simple/e3sm_simple.proto"

  # NOTE: the MPMC Queue Benchmark moved to .github/workflows/mpmc-bench.yml,
  # where it is gated on changes to include/libe3/mpmc_queue.hpp so it only
  # runs when the queue's core file changes.
