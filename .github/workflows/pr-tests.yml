name: Unit Tests

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Build and Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        build_type: [Debug, Release]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          chmod +x ./build_libe3 || true
          ./build_libe3 -I || true

      - name: Build and test with build_libe3 (${ { matrix.build_type } })
        shell: bash
        run: |
          chmod +x ./build_libe3 || true
          if [ "${{ matrix.build_type }}" = "Debug" ]; then
            BUILD_FLAG="-g"
          else
            BUILD_FLAG="-r"
          fi
          ./build_libe3 -c -d build -j $(nproc) $BUILD_FLAG -t

  benchmark:
    name: MPMC Queue Benchmark
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          chmod +x ./build_libe3 || true
          ./build_libe3 -I || true

      - name: Build (Release)
        run: |
          chmod +x ./build_libe3 || true
          ./build_libe3 -c -d build -j $(nproc) -r

      - name: Run MPMC benchmark
        run: ./build/test_bench_mpmc_queue | tee benchmark_results.md

      - name: Post benchmark results as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = fs.readFileSync('benchmark_results.md', 'utf8');
            const marker = '<!-- mpmc-bench-results -->';
            const sha = context.payload.pull_request.head.sha.substring(0, 7);
            const body = [
              marker,
              `## 📊 MPMC Queue Benchmark Results (commit \`${sha}\`)`,
              '',
              results,
              `> _Benchmarked on \`ubuntu-latest\`, Release build_`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
