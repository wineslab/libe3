name: Tag and Publish libe3 package

on:
  push:
    branches:
      - main

jobs:
  create-tag:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag_created: ${{ steps.set_output.outputs.tag_created }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read VERSION file
        id: get_version
        run: |
          version=$(cat VERSION | tr -d '[:space:]')
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: check_tag
        run: |
          if git rev-parse "refs/tags/${{ steps.get_version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag
        if: steps.check_tag.outputs.exists == 'false'
        id: create_push_tag
        run: |
          git tag ${{ steps.get_version.outputs.version }}
          git push origin ${{ steps.get_version.outputs.version }}

      - name: Set tag_created output
        id: set_output
        run: |
          if [ "${{ steps.check_tag.outputs.exists }}" = "false" ]; then
            echo "tag_created=true" >> $GITHUB_OUTPUT
          else
            echo "tag_created=false" >> $GITHUB_OUTPUT
          fi

  build-deb-amd64:
    name: Build Debian package (amd64)
    runs-on: ubuntu-latest
    needs: create-tag
    if: ${{ needs.create-tag.outputs.tag_created == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install build dependencies via build_libe3
        run: |
          sudo apt-get update
          chmod +x ./build_libe3 || true
          ./build_libe3 -I

      - name: Make packaging script executable
        run: |
          chmod +x ./scripts/create_deb.sh || true

      - name: Run packaging script for amd64
        run: |
          ./scripts/create_deb.sh amd64

      - name: Upload amd64 .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: libe3-deb-amd64
          path: build/libe3_${{ needs.create-tag.outputs.version }}_amd64.deb

  build-deb-arm64:
    name: Build Debian package (arm64)
    runs-on: ubuntu-24.04-arm
    needs: create-tag
    if: ${{ needs.create-tag.outputs.tag_created == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install build dependencies via build_libe3
        run: |
          sudo apt-get update
          chmod +x ./build_libe3 || true
          ./build_libe3 -I

      - name: Make packaging script executable
        run: |
          chmod +x ./scripts/create_deb.sh || true

      - name: Run packaging script for arm64
        run: |
          ./scripts/create_deb.sh arm64

      - name: Upload arm64 .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: libe3-deb-arm64
          path: build/libe3_${{ needs.create-tag.outputs.version }}_arm64.deb

  build-docs:
    name: Build API Documentation
    runs-on: ubuntu-latest
    needs: create-tag
    if: ${{ needs.create-tag.outputs.tag_created == 'true' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install build dependencies via build_libe3
        run: |
          sudo apt-get update
          chmod +x ./build_libe3 || true
          ./build_libe3 -I

      - name: Install Doxygen and Graphviz
        run: |
          sudo apt-get install -y doxygen graphviz

      - name: Build library and documentation
        run: |
          chmod +x ./build_libe3 || true
          ./build_libe3 -r --docs

      - name: Report documentation coverage
        run: |
          # Count documented vs undocumented symbols from Doxygen warnings
          total=$(grep -c "is not documented" build/docs/doxygen_warnings.txt 2>/dev/null || echo 0)
          echo "## Documentation Coverage" >> $GITHUB_STEP_SUMMARY
          if [ "$total" -eq 0 ]; then
            echo "✅ No undocumented public symbols detected." >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **${total} undocumented symbol(s)** found. See details below." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>Undocumented symbols</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            grep "is not documented" build/docs/doxygen_warnings.txt >> $GITHUB_STEP_SUMMARY || true
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Package HTML documentation
        run: |
          version=${{ needs.create-tag.outputs.version }}
          cd build/docs
          zip -r "../../libe3-docs-${version}.zip" html/
          echo "Documentation packaged as libe3-docs-${version}.zip"

      - name: Upload documentation artifact
        uses: actions/upload-artifact@v4
        with:
          name: libe3-docs
          path: libe3-docs-${{ needs.create-tag.outputs.version }}.zip

  github-release:
    name: Upload Debian package to GitHub Release
    needs:
      - build-deb-amd64
      - build-deb-arm64
      - build-docs
      - create-tag
    runs-on: ubuntu-latest
    if: ${{ needs.create-tag.outputs.tag_created == 'true' }}
    permissions:
      contents: write
    steps:
      - name: Download amd64 deb artifact
        uses: actions/download-artifact@v4
        with:
          name: libe3-deb-amd64
          path: dist/

      - name: Download arm64 deb artifact
        uses: actions/download-artifact@v4
        with:
          name: libe3-deb-arm64
          path: dist/

      - name: Download documentation artifact
        uses: actions/download-artifact@v4
        with:
          name: libe3-docs
          path: dist/

      - name: Create GitHub Release and upload assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version=${{ needs.create-tag.outputs.version }}
          gh release create "$version" --repo ${{ github.repository }} --notes "libe3 release $version" || true
          gh release upload "$version" dist/** --repo ${{ github.repository }} || true

  deploy-docs:
    name: Deploy Documentation to GitHub Pages
    needs:
      - build-docs
      - create-tag
    runs-on: ubuntu-latest
    if: ${{ needs.create-tag.outputs.tag_created == 'true' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Download documentation artifact
        uses: actions/download-artifact@v4
        with:
          name: libe3-docs
          path: /tmp/docs-artifact/

      - name: Extract documentation
        run: |
          version=${{ needs.create-tag.outputs.version }}
          mkdir -p /tmp/docs-html
          unzip "/tmp/docs-artifact/libe3-docs-${version}.zip" -d /tmp/docs-html/

      - name: Publish to gh-pages branch
        # Process overview:
        # 1. Configure git identity (needed to author the commit).
        # 2. Fetch and switch to the `gh-pages` branch, creating it as an orphan
        #    (history-free) if it does not yet exist.
        # 3. Wipe all existing content from the branch so stale files from a
        #    previous release do not linger.
        # 4. Copy the freshly-extracted Doxygen HTML tree into the branch root.
        # 5. Commit and push.  GitHub Pages will then automatically serve the
        #    content from this branch at https://<org>.github.io/<repo>/.
        run: |
          version=${{ needs.create-tag.outputs.version }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Switch to (or create) the gh-pages branch
          git fetch origin gh-pages:gh-pages 2>/dev/null || git checkout --orphan gh-pages
          git checkout gh-pages 2>/dev/null || true

          # Clear previous docs and replace with new HTML
          git rm -rf . --quiet 2>/dev/null || true
          cp -r /tmp/docs-html/html/. .

          git add -A
          git commit -m "docs: publish API documentation for ${version}" || echo "Nothing to commit"
          git push origin gh-pages

