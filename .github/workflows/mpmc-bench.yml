name: MPMC Queue Benchmark

# Runs the lock-free MPMC ring-buffer benchmark and posts the results as a PR
# comment. Gated by `paths`: it only runs when the queue's core file changes
# (or the workflow itself), so unrelated PRs don't pay the benchmark cost.
# Use the "Run workflow" button (workflow_dispatch) to run it on demand.

on:
  pull_request:
    branches:
      - main
    paths:
      - include/libe3/mpmc_queue.hpp
      - .github/workflows/mpmc-bench.yml
  workflow_dispatch:

jobs:
  benchmark:
    name: MPMC Queue Benchmark
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          chmod +x ./build_libe3 || true
          ./build_libe3 -I || true

      - name: Build (Release)
        run: |
          chmod +x ./build_libe3 || true
          ./build_libe3 -c -d build -j $(nproc) -r

      - name: Run MPMC benchmark
        run: ./build/test_bench_mpmc_queue | tee benchmark_results.md

      - name: Post benchmark results as PR comment
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = fs.readFileSync('benchmark_results.md', 'utf8');
            const marker = '<!-- mpmc-bench-results -->';
            const sha = context.payload.pull_request.head.sha.substring(0, 7);
            const body = [
              marker,
              `## 📊 MPMC Queue Benchmark Results (commit \`${sha}\`)`,
              '',
              results,
              `> _Benchmarked on \`ubuntu-latest\`, Release build_`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
